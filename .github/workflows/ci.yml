name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run bench
      - run: npm run build
      # Ensure the committed action bundle is in sync with src/.
      - name: Verify action bundle is fresh
        run: |
          npm run build:action
          if [ -n "$(git status --porcelain -- action-dist/)" ]; then
            echo "::error::action-dist bundle is stale — run 'npm run build:action' and commit the result"
            git --no-pager diff --stat -- action-dist/ || true
            exit 1
          fi
